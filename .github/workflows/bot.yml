name: NEXUS GOLD Bot

on:
  schedule:
    - cron: '*/10 * * * *'   # ทุก 10 นาที
  workflow_dispatch:          # กด Run manually ได้

permissions:
  contents: write             # ให้ commit state.json กลับได้

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run NEXUS GOLD analysis
        env:
          BINANCE_API_KEY:     ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET:  ${{ secrets.BINANCE_API_SECRET }}
          LINE_CHANNEL_TOKEN:  ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID:        ${{ secrets.LINE_USER_ID }}
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
        run: python run_once.py

      - name: Save state back to repo
        run: |
          git config user.name  "NEXUS Bot"
          git config user.email "bot@nexusgold.ai"
          git add state.json || true
          git diff --staged --quiet || git commit -m "state: update cycle $(date -u '+%H:%M UTC')"
          git push || true
